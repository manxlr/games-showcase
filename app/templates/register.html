<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Games Showcase</title>
    <link rel="icon" href="/static/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/static/icons/icon.png" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>
    <div class="background-grid"></div>

    <main class="auth-container">
        <section class="auth-card glass-panel">
            <p class="eyebrow">Create Account</p>
            <h1>Register</h1>
            <p class="subtitle">Start tracking your gaming journey.</p>

            {% if error %}
            <p class="auth-error">{{ error }}</p>
            {% endif %}

            <form method="post" action="/register" class="auth-form">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required />

                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />

                <label for="password">Password</label>
                <input id="password" name="password" type="password" required />

                <button type="submit" class="auth-btn">Create account</button>
            </form>

            <p class="auth-footer">
                Already registered?
                <a href="/login">Login</a>
                · <a href="/help">How it works</a>
            </p>
        </section>
    </main>
</body>
</html>
